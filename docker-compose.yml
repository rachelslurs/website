services:
  # Optional: dev server container (not required for Playwright)
  app:
    image: node:20
    ports:
      - "4321:4321"
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 4321
    volumes:
      - ./:/app
      - npm_cache:/root/.npm

  # Run Playwright visual regression in the official image (Linux baselines match CI).
  playwright:
    platform: linux/amd64
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /work
    volumes:
      - ./:/work
      - npm_cache:/root/.npm
    # better-sqlite3 (via Tina) may compile from source; Playwright image lacks `make` by default.
    command: bash -lc "apt-get update && apt-get install -y --no-install-recommends make g++ python3 && npm ci && npm run test:visual"

  # Regenerate baselines (Linux) and write them into the mounted repo.
  playwright-update:
    platform: linux/amd64
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /work
    volumes:
      - ./:/work
      - npm_cache:/root/.npm
    command: bash -lc "apt-get update && apt-get install -y --no-install-recommends make g++ python3 && npm ci && npm run test:visual:update"

volumes:
  npm_cache:
