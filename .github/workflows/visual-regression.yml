name: Visual regression

on:
  pull_request:
    branches: ["**"]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch: {}

jobs:
  playwright:
    runs-on: ubuntu-latest
    # Use the official Playwright image so browsers/deps are preinstalled.
    # Baselines should be generated on Linux to match CI rendering.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (for native Node modules)
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's|http://archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://security.ubuntu.com/ubuntu|g' /etc/apt/sources.list
          apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          apt-get install -y --no-install-recommends g++ make python3
          rm -rf /var/lib/apt/lists/*

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run visual tests
        run: npm run test:visual

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload screenshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshot-diffs
          path: |
            test-results/**/**-actual.png
            test-results/**/**-diff.png

  # Optional: manual baseline regeneration in CI.
  # Usage:
  # - Run this workflow via "Run workflow" (workflow_dispatch)
  # - Commit the updated `tests/visual/__screenshots__/` outputs to the PR.
  update-baselines:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (for native Node modules)
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's|http://archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://security.ubuntu.com/ubuntu|g' /etc/apt/sources.list
          apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          apt-get install -y --no-install-recommends g++ make python3
          rm -rf /var/lib/apt/lists/*
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Update visual baselines
        run: npm run test:visual:update
      - name: Upload updated baselines
        uses: actions/upload-artifact@v4
        with:
          name: updated-visual-baselines
          path: tests/visual/__screenshots__

