# Quality gate: lint, production build, dist bundle summary (see scripts/perf-baseline.mjs)
name: Performance baseline

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  # Run on every branch so feature work is checked before it reaches main
  push:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: performance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Integrate latest main before lint/build so checks match what will land (skips pushes to main and tag pushes)
      - name: Merge latest main
        if: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git merge origin/main --no-edit

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Astro check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Bundle baseline
        run: npm run perf:report
